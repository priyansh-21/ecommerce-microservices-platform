server:
  port: ${PORT:8080}

spring:
  application:
    name: ecommerce-platform

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:ecommerce}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: ${CACHE_TYPE:simple}
    redis:
      time-to-live: 60000

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-in-production-minimum-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.priyansh.ecommerce: INFO
